<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Iman Style - Couture de Luxe</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0f0f0f;color:white;}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url('https://via.placeholder.com/1200x800') center/cover;
}
.hero h1{
font-family:'Playfair Display',serif;
font-size:50px;
letter-spacing:2px;
}
.hero p{margin-top:10px;color:#ccc;}
.btn{
margin-top:20px;
display:inline-block;
padding:12px 25px;
border:1px solid gold;
color:gold;
text-decoration:none;
transition:0.3s;
}
.btn:hover{background:gold;color:black;}

/* SECTION */
.section{padding:80px 20px;text-align:center;}
.section h2{
font-family:'Playfair Display',serif;
margin-bottom:40px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.card{
position:relative;
overflow:hidden;
}
.card img{
width:100%;
height:300px;
object-fit:cover;
transition:0.5s;
}
.card:hover img{transform:scale(1.1);}
.card .overlay{
position:absolute;
bottom:0;
background:rgba(0,0,0,0.7);
width:100%;
padding:15px;
transform:translateY(100%);
transition:0.4s;
}
.card:hover .overlay{transform:translateY(0);}

/* ANIMATION */
.fade{opacity:0;transform:translateY(40px);transition:1s;}
.show{opacity:1;transform:translateY(0);}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
}

/* FOOTER */
footer{text-align:center;padding:20px;background:#000;color:#aaa;}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero fade">
<div>
<h1>Iman Style</h1>
<p>La couture qui révèle votre élégance</p>
<a href="https://wa.me/243XXXXXXXXX?text=Bonjour%20Iman%20Style" class="btn">Commander</a>
</div>
</section>

<!-- SERVICES -->
<section class="section fade">
<h2>Nos Services</h2>
<div class="grid">
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Couture sur mesure</div></div>
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Retouches</div></div>
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Tenues mariage</div></div>
</div>
</section>

<!-- GALERIE -->
<section class="section fade">
<h2>Nos Créations</h2>
<div class="grid">
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Design 1</div></div>
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Design 2</div></div>
<div class="card"><img src="https://via.placeholder.com/400"><div class="overlay">Design 3</div></div>
</div>
</section>

<!-- CONTACT -->
<section class="section fade">
<h2>Contact</h2>
<p>Lubumbashi</p>
<p><a href="https://wa.me/243XXXXXXXXX?text=Bonjour%20Iman%20Style" style="color:gold;">WhatsApp</a></p>
</section>

<footer>
<p>© Iman Style - Couture Premium</p>
</footer>

<a class="whatsapp" href="https://wa.me/243XXXXXXXXX?text=Bonjour%20Iman%20Style%2C%20je%20souhaite%20commander%20une%20tenue.?text=Bonjour%20Iman%20Style">💬</a>

<script>
let elements=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
elements.forEach(el=>{
let top=el.getBoundingClientRect().top;
if(top<window.innerHeight-100){el.classList.add('show');}
});
});
</script>

</body>
</html>https
